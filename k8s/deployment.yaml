apiVersion: v1
kind: Service
metadata:
  name: digital-card
  namespace: dompedro
spec:
  selector:
    app: digital-card
  ports:
    - port: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-card
  namespace: dompedro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digital-card
  template:
    metadata:
      labels:
        app: digital-card
    spec:
      containers:
        - name: digital-card
          image: dompedro-digital-card:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
